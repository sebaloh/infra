# HTTP Strict Transport Security (HSTS) - Forces browsers to use HTTPS connections only for 1 year, includes all subdomains, and allows preloading in browser HSTS lists
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# X-Frame-Options - Prevents the page from being embedded in frames/iframes to protect against clickjacking attacks
add_header X-Frame-Options "SAMEORIGIN" always;

# X-XSS-Protection - Deprecated in modern browsers, but kept for legacy browser compatibility (IE, older Safari)
# Note: Modern browsers use CSP instead, this header is ignored in Chrome/Firefox/Edge
add_header X-XSS-Protection "1; mode=block" always;

# X-Content-Type-Options - Prevents browsers from MIME-sniffing responses, forcing them to respect declared content types
add_header X-Content-Type-Options "nosniff" always;

# X-DNS-Prefetch-Control - Controls DNS prefetching to prevent privacy leaks through speculative DNS lookups
add_header X-DNS-Prefetch-Control "off" always;

# X-Download-Options - Prevents Internet Explorer from executing downloads in the site's context
add_header X-Download-Options "noopen" always;

# Referrer-Policy - Controls how much referrer information is sent with requests, only sending origin when crossing origins
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content-Security-Policy - Strict policy allowing only same-origin resources, customize per application as needed
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests;" always;

# Permissions-Policy - Restricts browser features, all disabled by default for maximum security
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;

# X-Robots-Tag - Prevents search engine indexing for services (can be overridden for websites)
add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

# Cache-Control - Prevents caching of sensitive service content
add_header Cache-Control "no-cache, no-store, must-revalidate, private" always;
add_header Pragma "no-cache" always;

# Cross-Origin Policies - Enhanced isolation for services
# COEP: Using credentialless instead of require-corp to allow external resources (Gravatar, Google Fonts) while maintaining isolation
add_header Cross-Origin-Embedder-Policy "credentialless" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# X-Permitted-Cross-Domain-Policies - Restricts Adobe Flash and Acrobat cross-domain policies
add_header X-Permitted-Cross-Domain-Policies "none" always;