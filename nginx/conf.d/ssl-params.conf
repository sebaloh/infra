# SSL Protocols - Only allow TLS 1.2 and 1.3, disabling older insecure versions (SSLv3, TLS 1.0, TLS 1.1)
ssl_protocols TLSv1.2 TLSv1.3;

# SSL Ciphers - Modern cipher suite prioritizing ECDHE key exchange and AES-GCM for forward secrecy and performance
ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

# SSL Cipher Preference - Server chooses cipher order for TLS 1.2, TLS 1.3 handles this automatically
ssl_prefer_server_ciphers on;

# SSL ECDH Curve - Use modern elliptic curves for key exchange, prioritizing X25519 for performance and security
ssl_ecdh_curve X25519:secp384r1:secp256r1;

# SSL DH Parameters - Use strong 4096-bit Diffie-Hellman parameters for DHE key exchange (generate with: openssl dhparam -out /etc/nginx/dhparam.pem 4096)
# ssl_dhparam /etc/nginx/dhparam.pem;

# SSL Session Cache - Shared cache of 10MB for SSL session resumption, reducing handshake overhead
ssl_session_cache shared:SSL:10m;

# SSL Session Timeout - Sessions are valid for 1 day, balancing security with performance for returning visitors
ssl_session_timeout 1d;

# SSL Session Tickets - Disabled to ensure perfect forward secrecy, as session tickets can compromise PFS
ssl_session_tickets off;

# OCSP Stapling - Server fetches and caches OCSP responses, improving client performance and privacy
ssl_stapling on;
ssl_stapling_verify on;

# DNS Resolver - Required for OCSP stapling, using Cloudflare and Google DNS with timeout settings
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# SSL Buffer Size - Optimized for low latency, smaller size reduces Time To First Byte (TTFB)
ssl_buffer_size 4k;

# Early Data (0-RTT) - Disabled to prevent replay attacks, enable only if application handles replays safely
ssl_early_data off;